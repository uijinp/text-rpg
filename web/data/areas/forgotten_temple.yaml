forgotten_temple:
  actions:
    # 1. 첫 방문 연출
    - action: if
      cond: {not_flag: temple_visited}
      then:
        - action: divider
          title: "잊혀진 신전"
        - action: print
          text: |

            이끼로 뒤덮인 고대 신전의 입구.
            누군가 이곳을 봉인하려 했던 흔적이 남아 있지만,
            봉인은 이미 오래전에 깨진 듯하다.
            어둠 속에서 타락한 정령들의 신음 소리가 들려온다.
        - action: set_flag
          key: temple_visited
          value: true
        - action: pause

    # 2. 메인 루프
    - action: loop
      body:
        - action: divider
          title: "잊혀진 신전"

        - action: menu
          options:
            - label: "신전 최심부 탐색"
              when: {not_flag: temple_cleared}
              actions:
                - action: goto
                  scene: temple_boss

            - label: "신전 내부 탐색"
              actions:
                - action: print
                  text: "\n  신전 복도를 조심스럽게 탐색한다."
                - action: random
                  branches:
                    - weight: 0.4
                      actions:
                        - action: print
                          text: "  어둠 속에서 타락한 정령이 나타났다!"
                        - action: battle
                          enemy: corrupted_spirit
                    - weight: 0.3
                      actions:
                        - action: print
                          text: "  무너진 벽 틈에서 오래된 보물을 찾았다!"
                        - action: add_gold
                          amount: 40
                    - weight: 0.3
                      actions:
                        - action: print
                          text: "  고대 문자가 새겨진 벽화를 발견했다. 해독할 수는 없다."

            - label: "기도의 제단"
              actions:
                - action: if
                  cond: {not_flag: temple_prayer_used}
                  then:
                    - action: print
                      text: |

                        신전 한켠에 아직 빛이 남아 있는 제단을 발견했다.
                        무릎을 꿇고 기도하자, 따뜻한 빛이 온몸을 감싼다.
                    - action: heal
                      amount: 50
                    - action: set_flag
                      key: temple_prayer_used
                      value: true
                    - action: print
                      text: "  HP가 50 회복되었다!"
                    - action: pause
                  else:
                    - action: print
                      text: "\n  제단의 빛은 이미 사라졌다. 더 이상 기도할 수 없다."

            - label: "돌아가기"
              actions:
                - action: break

  # 3. 보스전 씬
  scenes:
    temple_boss:
      actions:
        - action: divider
          title: "신전 최심부 - 봉인의 방"
        - action: print
          text: |

            신전 가장 깊은 곳, 거대한 석실에 도착했다.
            바닥에 새겨진 봉인진이 불길한 빛을 내뿜고 있다.
            수백 년 동안 봉인되어 있던 고대 골렘이 깨어나기 시작한다!
        - action: battle
          name: "고대 봉인 골렘"
          enemy: labyrinth_golem
          hp_multiply: 1.3
          on_win:
            - action: divider
              title: "봉인 해제!"
            - action: print
              text: |

                골렘이 무너지자, 봉인의 빛이 사라진다.
                골렘의 핵에서 찬란하게 빛나는 부적이 나타났다.
                고대의 축복이 담긴 이 부적은 주인을 지켜줄 것이다.
            - action: set_flag
              key: temple_cleared
              value: true
            - action: add_item
              item: "고대의 부적"
            - action: add_gold
              amount: 200
            - action: pause
          on_lose:
            - action: print
              text: |

                골렘의 거대한 주먹에 의해 벽으로 날아갔다.
                의식이 점점 흐려진다...
