elf_village:
  actions:
    # 1. 첫 방문 연출 (숲을 헤치고 도착 + 수호자와 조우)
    - action: if
      cond: {not_flag: elf_village_visited}
      then:
        - action: divider
          title: "엘프 마을 진입로"
        - action: print
          text: |
            
            어두운 숲의 끝자락에 다다르자 울창한 거목들 사이로 은은한 은빛 조명들이 일렁이는 장소가 나타났다.
            마을의 고요함을 깨고 당신의 발자국 소리가 울린다.
            
            "멈춰라. 인간이여."
            
            나무 위에서 수십 명의 엘프 궁수들이 일제히 당신을 겨누고 있다.
            긴장감이 도는 찰나, 백발의 엘프 촌장이 무리를 헤치고 나섰다.
        - action: set_flag
          key: elf_village_visited
          value: true
        - action: pause

    # 2. 마을 루프 (촌장 대화, 상점, 휴식)
    - action: loop
      body:
        - action: divider
          title: "엘프의 숲 마을"
        - action: print
          text: "\n아름다운 나뭇잎 지붕을 가진 집들이 이어져 있다. 여전히 경계의 시선이 남아있다."
        - action: menu
          options:
            - label: "엘프 촌장과 대화"
              actions:
                - action: if
                  cond: {not_flag: spirit_forest_cleared}
                  then:
                    # 정령왕 구출 전 대사 (퀘스트 부여)
                    - action: print
                      text: |
                        
                        엘프 촌장: "경계하는 우리를 용서하게. 요즈음 숲의 기운이 몹시 흉흉하다네."
                        "원래 이 숲은 위대한 세계수와 정령왕의 가호를 받아 평화로웠지."
                        "하지만 최근 서쪽의 '정령왕의 숲'에서 타락한 마기가 흘러나오고 있어."
                        "부탁하네. 서쪽 숲으로 가서 정령왕께 무슨 일이 생겼는지 확인해 주게나."
                        
                        [ 시스템: 지도 좌측에 '정령왕의 숲(S)' 통로가 개방됩니다! ]
                    - action: pause
                  else:
                    # 정령왕 구출 후 대사 (보상 및 감사)
                    - action: print
                      text: |
                        
                        엘프 촌장: "숲의 공기가 놀랍도록 맑아졌네! 자네가 마침내 정령왕님을 구원해 냈군!"
                        "우리 종족의 오랜 염원을 풀어주어 깊이 감사하네."
                        "이것은 거룩한 세계수에서 피어난 잎사귀일세. 요긴하게 쓰게나."
                    - action: if
                      cond: {not_flag: elf_reward_given}
                      then:
                        - action: set_flag
                          key: elf_reward_given
                          value: true
                        - action: add_item
                          item: "세계수의 잎사귀"
                          count: 3
                    - action: pause

            - label: "숲의 상인 방문"
              actions:
                - action: print
                  text: |
                    
                    상인: "인간치곤 꽤 쓸만한 장비를 차고 있군. 내 물건도 구경해 보라구."
                - action: shop
                  items:
                    - item: "세계수의 잎사귀"
                      price: 80
                    - item: "엘프의 장궁"
                      price: 220
                    - item: "엘프의 로브"
                      price: 150
                    - item: "해독제"
                      price: 15

            - label: "엘프 수호자와 대련 (훈련)"
              actions:
                - action: print
                  text: |
                    
                    엘프 수호자: "인간의 실력이나 한 번 볼까? 덤벼봐라!"
                - action: battle
                  name: "가벼운 대련"
                  enemy: elf_guardian
                  on_win:
                    - action: print
                      text: "\n수호자: \"제법이군... 인정하마.\""
                    - action: pause
                  on_lose:
                    - action: print
                      text: "\n수호자: \"아직 한참 멀었군. 돌아가라!\"\n(대련이므로 치명상을 입진 않았다. 체력이 1로 회복됩니다.)"
                    - action: heal
                      amount: 1
                    - action: pause

            - label: "마을 밖으로 나가기"
              actions:
                - action: break
